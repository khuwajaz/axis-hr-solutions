<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard | Axis HR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>HR Applications Dashboard</h1>

<table border="1" width="100%" id="dataTable">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Position</th>
    <th>Resume Link</th>
  </tr>
</table>

<script>
const SHEET_URL = "YOUR_GOOGLE_SHEET_CSV_LINK";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(data => {
    let rows = data.split("\n").slice(1);

    rows.forEach(row => {
      let cols = row.split(",");

      let table = document.getElementById("dataTable");

      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${cols[0]}</td>
        <td>${cols[1]}</td>
        <td>${cols[2]}</td>
        <td>${cols[3]}</td>
        <td><a href="${cols[4]}" target="_blank">View CV</a></td>
      `;

      table.appendChild(tr);
    });
  });
</script>

</body>
</html>
