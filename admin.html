<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Axis HR Admin Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
    }

    header {
      background: #0F4C81;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      color: #0F4C81;
      margin-top: 30px;
    }

    button {
      background: #0F4C81;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    button:hover {
      background: #0c3a66;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: pre-wrap;
      font-size: 13px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #0F4C81;
      color: white;
    }

    .section {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Axis HR Admin Dashboard</h1>
  </header>

  <div class="container">

    <button onclick="loadData()">🔄 Load Data</button>

    <div class="section">
      <h2>📡 RAW DATA (Debug Mode)</h2>
      <div id="raw" class="box">Click load to fetch data...</div>
    </div>

    <div class="section">
      <h2>📄 Structured View (If possible)</h2>
      <div id="structured" class="box">Waiting for data...</div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby-AF7cfYvmIh80yqxQao96WRwhs1NmL6IrxyIFGeRqAkJ8QX99gZCbB-qXeRXPlScaDQ/exec";

    async function loadData() {
      document.getElementById("raw").innerText = "Loading...";
      document.getElementById("structured").innerText = "Processing...";

      try {
        const res = await fetch(API_URL);
        const text = await res.text();

        // STEP 1: Show raw response
        document.getElementById("raw").innerText = text;

        // STEP 2: Try parsing JSON safely
        try {
          const data = JSON.parse(text);

          let html = "";

          // CONTACTS
          if (data.contacts && Array.isArray(data.contacts)) {
            html += "<h3>📩 Contacts</h3><table><tr><th>Name</th><th>Email</th><th>Message</th></tr>";

            data.contacts.forEach(c => {
              html += `<tr>
                <td>${c.name || ""}</td>
                <td>${c.email || ""}</td>
                <td>${c.message || ""}</td>
              </tr>`;
            });

            html += "</table>";
          }

          // CVS
          if (data.cvs && Array.isArray(data.cvs)) {
            html += "<h3>📄 CV Submissions</h3><table><tr><th>Name</th><th>Email</th><th>Phone</th><th>Message</th></tr>";

            data.cvs.forEach(c => {
              html += `<tr>
                <td>${c.name || ""}</td>
                <td>${c.email || ""}</td>
                <td>${c.phone || ""}</td>
                <td>${c.message || ""}</td>
              </tr>`;
            });

            html += "</table>";
          }

          document.getElementById("structured").innerHTML = html || "No structured data found.";

        } catch (e) {
          document.getElementById("structured").innerText =
            "⚠ Your backend is not returning JSON yet.\nWe are in safe debug mode.\n\nNext step: fix Google Script format.";
        }

      } catch (err) {
        document.getElementById("raw").innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
