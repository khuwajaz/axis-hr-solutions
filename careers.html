<form id="careerForm" action="#" method="POST" enctype="multipart/form-data">

  <label>Full Name</label>
  <input type="text" name="name" required>

  <label>Email Address</label>
  <input type="email" name="email" required>

  <label>Phone Number</label>
  <input type="tel" name="phone">

  <label>Position Applying For</label>
  <input type="text" name="position">

  <!-- Resume Upload -->
  <label>Upload Resume (PDF/DOC)</label>
  <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

  <!-- Cover Letter Upload (Optional) -->
  <label>Upload Cover Letter (Optional)</label>
  <input type="file" name="cover_letter" accept=".pdf,.doc,.docx">

  <!-- OR Cover Letter Text Alternative -->
  <label>Or Write Cover Letter</label>
  <textarea name="cover_letter_text" rows="6"
    placeholder="Write your cover letter here..."></textarea>

  <button type="submit">Submit Application</button>

</form>
