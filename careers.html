<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careers | Axis HR Solutions</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}

button {
  padding: 8px 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

form {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

#positionText {
  color: green;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Current Vacancies</h1>

<!-- JOB CARDS -->
<div class="card">
  <h3>HR Officer</h3>
  <p>Islamabad</p>
  <button type="button" onclick="setJob('HR Officer')">Apply</button>
</div>

<div class="card">
  <h3>Admin Manager</h3>
  <p>Lahore</p>
  <button type="button" onclick="setJob('Admin Manager')">Apply</button>
</div>

<hr>

<h2>Job Application Form</h2>

<p><strong>Selected Position:</strong> <span id="positionText">None</span></p>

<!-- FORM START -->
<form id="careerForm">

  <!-- FIXED POSITION FIELD (IMPORTANT) -->
  <input type="hidden" name="position" id="position" required>

  <input type="text" name="name" placeholder="Full Name" required>

  <input type="email" name="email" placeholder="Email Address" required>

  <input type="text" name="phone" placeholder="Phone Number" required>

  <!-- CV UPLOAD (FORMPSREE HANDLES THIS) -->
  <label>Upload CV (PDF/DOC)</label>
  <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

  <textarea name="cover_letter" placeholder="Cover Letter (Optional)"></textarea>

  <button type="submit">Submit Application</button>

</form>

<script>
/* -------------------------
   JOB SELECTION FIXED
--------------------------*/
function setJob(job) {
  document.getElementById("position").value = job;
  document.getElementById("positionText").innerText = job;

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

/* -------------------------
   GOOGLE SHEET LINK (YOUR API)
--------------------------*/
const SHEET_URL = "https://script.google.com/macros/s/AKfycby-AF7cfYvmIh80yqxQao96WRwhs1NmL6IrxyIFGeRqAkJ8QX99gZCbB-qXeRXPlScaDQ/exec";

/* -------------------------
   FORM SUBMISSION
--------------------------*/
document.getElementById("careerForm").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(SHEET_URL, {
    method: "POST",
    body: JSON.stringify({
      name: this.name.value,
      email: this.email.value,
      phone: this.phone.value,
      position: document.getElementById("position").value,
      cover_letter: this.cover_letter.value || ""
    })
  })
  .then(() => {
    alert("Application submitted successfully!");
    this.reset();
    document.getElementById("positionText").innerText = "None";
  })
  .catch(() => {
    alert("Error submitting application. Please try again.");
  });
});
</script>

</body>
</html>
