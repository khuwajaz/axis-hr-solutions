<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careers | Axis HR Solutions</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<label for="locationFilter">Filter by Location:</label>

<select id="locationFilter" onchange="filterJobs()">
  <option value="all">All Locations</option>
  <option value="islamabad">Islamabad</option>
  <option value="lahore">Lahore</option>
</select>
  
<h1>Current Vacancies</h1>

<div class="card">
  <h3>HR Officer</h3>
  <p>Islamabad</p>
  <button onclick="openForm('HR Officer')">Apply Now</button>
</div>

<div class="card" data-location="islamabad">
  <h3>HR Officer</h3>
  <p>Islamabad</p>
  <button onclick="openForm('HR Officer')">Apply Now</button>
</div>

<div class="card" data-location="lahore">
  <h3>Admin Manager</h3>
  <p>Lahore</p>
  <button onclick="openForm('Admin Manager')">Apply Now</button>
</div>

<hr>

<h2>Apply for Job</h2>

<form action="https://formspree.io/f/YOUR_ID" method="POST" enctype="multipart/form-data">

  <input type="hidden" id="position" name="position">

  <label>Full Name</label>
  <input type="text" name="name" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Phone</label>
  <input type="tel" name="phone">

  <label>Upload CV</label>
  <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

  <button type="submit">Submit Application</button>

</form>

<script>
function openForm(jobTitle) {
  document.getElementById("position").value = jobTitle;
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}
</script>

</body>
</html>
